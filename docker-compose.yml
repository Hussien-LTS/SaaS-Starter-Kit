version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: saas_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3030:3030'
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev